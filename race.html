<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baguette Run</title>
    <style>
       body {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: #222;
            display: flex;
            flex-direction: column; /* Stacks everything top-to-bottom */
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #game-area {
            position: relative;
            flex-grow: 1; /* Forces the game to fill all space above the control bar */
            width: 100%;
            overflow: hidden;
        }

        canvas {
            background-color: #ffcc99; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }
        
        #loading {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px;
            z-index: 100;
        }
        
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .menu-box {
            pointer-events: auto; 
            background: rgba(0, 0, 0, 0.85);
            padding: 50px;
            border-radius: 12px;
            border: 2px solid #555;
            text-align: center;
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            min-width: 400px;
            max-height: 80vh; 
            display: flex;
            flex-direction: column;
        }
        
        .menu-box h2 {margin-top: 0; color: #FFD700; flex-shrink: 0; }

        /* 🎯 NEW: Move ONLY the finish menu to the right third of the screen */
        #finish-menu {
            left: auto; /* Tells it to ignore the center positioning */
            right: 5%; /* Pins it 5% away from the right edge */
            transform: translateY(-50%); /* Keeps it centered up-and-down, but not left-and-right */
            width: 20%; /* Forces it to take up roughly a third of the screen */
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            font-family: inherit;
            font-size: 16px;
            border-radius: 6px;
            margin-bottom: 15px;
            resize: none;
            flex-grow: 1;
        }

        /* --- THE DASHBOARD CONTROL BAR --- */
        #control-bar {
            background: rgba(0, 0, 0, 0.9);
            border-top: 2px solid #555;
            padding: 15px 30px;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
        }

        #setup-controls, #race-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 900px;
            justify-content: center;
        }

        #race-controls {
            justify-content: flex-start;
        }

        button {
            pointer-events: auto;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            white-space: nowrap;
        }
        button:hover { filter: brightness(1.2); transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        
        button.primary { background: #4CAF50; font-size: 18px; ding: 12px 30px;}
        button.success { background: #4CAF50; } 
        button.danger { background: #f44336; }
        button.warning { background: #ff9800; color: #222; }
        button.secondary { background: #4D96FF; }
        button.save { background: #6BCB77; width: 100%; font-size: 18px; flex-shrink: 0;}

        #btn-pause { width: 150px; text-align: center; }

        #results-list {
            text-align: left; 
            margin-bottom: 20px;
            overflow-y: auto; 
            padding-right: 10px;
            flex-grow: 1;
        }

        #results-list::-webkit-scrollbar { width: 8px; }
        #results-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
        #results-list::-webkit-scrollbar-thumb { background: #666; border-radius: 4px; }

        .result-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.1);
            margin-bottom: 8px;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .remove-label {
            font-size: 14px;
            cursor: pointer;
            color: #ff9800;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 5px 10px;
            border-radius: 4px;
        }
        .remove-label:hover { background: rgba(0,0,0,0.6); }
        .remove-label input { width: 18px; height: 18px; cursor: pointer; }

    </style>
</head>
<body>

    <div id="game-area">
        <div id="loading">Loading Assets...</div>
        <canvas id="gameCanvas" style="display: none;"></canvas>

        <div id="ui-layer" style="display: none;">
            
            <div id="roster-menu" class="menu-box">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h2 style="margin: 0;">Class Roster</h2>
                    <button id="btn-restore-roster" class="warning" style="padding: 6px 12px; font-size: 14px;">↺ RESTORE REMOVED</button>
                </div>
                <p style="margin-top:0; color:#ccc; text-align: left;">Paste your student names (one per line):</p>
                
                <textarea id="roster-input" rows="10" placeholder="Paste your student names here..."></textarea>
                <button id="btn-save-roster" class="save">SAVE ROSTER & START</button>
            </div>

            <div id="finish-menu" class="menu-box" style="display: none; min-width: 450px;">
                <h2 style="font-size: 32px; margin-bottom: 20px;">🏁 RACE FINISHED!</h2>
                <div id="results-list"></div>
                <button id="btn-next-race" class="primary" style="width: 100%; flex-shrink: 0;">START NEXT RACE</button>
            </div>

        </div>
    </div>

    <div id="control-bar" style="display: none;">
        
        <div id="setup-controls">
            <button id="btn-edit-roster" class="secondary">📋 EDIT ROSTER</button>
            <button id="btn-reroll" class="secondary">🎲 COSTUME CHANGE</button>
            <button id="btn-length" class="secondary">⏱️ LENGTH: Short (5s)</button>
            <button id="btn-start" class="primary">▶️ START RACE</button>
        </div>
        
        <div id="race-controls" style="display: none;">
            <button id="btn-pause" class="warning">⏸️ PAUSE</button>
            <button id="btn-reset" class="danger">⏹️ ABORT</button>
            
            <div style="flex-grow: 1; margin-left: 20px; text-align: left;">
                <div style="margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #ccc;">RACE PROGRESS</div>
                <div style="background: rgba(255,255,255,0.2); border-radius: 8px; height: 20px; width: 100%; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);">
                    <div id="progress-bar-fill" style="background: #4CAF50; height: 100%; width: 0%; transition: width 0.1s linear;"></div>
                </div>
            </div>
        </div>

    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const loadingMsg = document.getElementById('loading');
    
    // UI Elements
    const uiLayer = document.getElementById('ui-layer');
    const rosterMenu = document.getElementById('roster-menu');
    const finishMenu = document.getElementById('finish-menu');
    const controlBar = document.getElementById('control-bar');
    const setupControls = document.getElementById('setup-controls');
    const raceControls = document.getElementById('race-controls');
    const progressBarFill = document.getElementById('progress-bar-fill');
    const resultsListDiv = document.getElementById('results-list');
    
    const btnEditRoster = document.getElementById('btn-edit-roster');
    const btnRestoreRoster = document.getElementById('btn-restore-roster');
    const btnReroll = document.getElementById('btn-reroll'); // <-- NEW BUTTON
    const btnLength = document.getElementById('btn-length');
    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');
    const btnReset = document.getElementById('btn-reset');
    const btnNextRace = document.getElementById('btn-next-race');

    // ==========================================
    // LIVE DATA PIPELINE SETUP
    // ==========================================
    
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbyzIMJoi1ZkBEoVYRUyMURhrGGUU1G7RXEXmPDTGCxvqkiJQHM2mV3Y46FR8VwgZQRC/exec"; 
    
    // The bucket that will hold all our custom AI images
    let baguetteBucket = []; 

const assets = {
        bg: new Image(),
        track: new Image(),
        wall: new Image(),
        start: new Image(),
        ninja: new Image() // The solo fallback!
    };

    // NEW: Give all the environment assets the VIP Pass so Dropbox allows them!
    for (let key in assets) {
        assets[key].crossOrigin = "Anonymous";
    }

    let assetsLoaded = 0;
    const totalAssets = Object.keys(assets).length;

    // STEP 1: Fetch the data from Google Sheets first
    async function loadDataFromSheets() {
        loadingMsg.innerText = "Loading Image Bucket from Sheets...";
        
        try {
            const response = await fetch(SHEET_API_URL);
            const data = await response.json();
            
            baguetteBucket = []; // Clear the bucket

            data.forEach(row => {
                // We ONLY care about the image links now! The sheet is just a bucket of costumes.
                if (row.imgUrl && row.imgUrl.trim() !== "") {
                    let customImg = new Image();
                    customImg.crossOrigin = "Anonymous"; // VIP PASS
                    customImg.src = row.imgUrl;
                    baguetteBucket.push(customImg);
                }
            });
            
            console.log(`Loaded ${baguetteBucket.length} custom images into the bucket.`);
            
            // Move on to loading standard background assets
            loadGameAssets();

        } catch (error) {
            console.error("Failed to load from Sheets. Check URL or permissions.", error);
            loadingMsg.innerText = "Error loading data. Playing with default roster.";
            loadGameAssets();
        }
    }

    // STEP 2: Load the standard background/fallback graphics
    function loadGameAssets() {
        loadingMsg.innerText = "Loading Graphics...";
        
        function checkReady() {
            assetsLoaded++;
            if (assetsLoaded === totalAssets) {
                loadingMsg.style.display = 'none';
                canvas.style.display = 'block';
                uiLayer.style.display = 'flex'; 
                initGame();
            }
        }

        for (let key in assets) {
            assets[key].onload = () => {
                checkReady();
            };
            assets[key].onerror = () => {
                console.error(`Failed to load fallback: ${key}. Skipping...`);
                checkReady(); // Count it even if it fails, preventing the freeze!
            };
        }

// NEW: A mini link-scrubber so you can paste raw Dropbox links!
        function cleanLink(url) {
            return url.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('&dl=0', '').replace('?dl=0', '');
        }

        // ⚠️ PASTE YOUR RAW DROPBOX LINKS HERE ⚠️
        assets.bg.src = cleanLink('https://www.dropbox.com/scl/fi/z528ijv9qafp5qil78538/mountain.png?rlkey=8ha7w2ybry46iflbkkaefc2km&st=phv3i3oa&dl=0'); 
        assets.track.src = cleanLink('https://www.dropbox.com/scl/fi/4jrjmu60ddjftq6zmag2g/track.jpg?rlkey=47tiqh5p1pclfmygmbxfajxbi&st=f7yptm5t&dl=0');
        assets.wall.src = cleanLink('https://www.dropbox.com/scl/fi/p1ii4byb2lt5a3sdxp2ta/wall.png?rlkey=s5015lu9yvpj43zfg32rry3h7&st=q2tka5cy&dl=0'); 
        assets.start.src = cleanLink('https://www.dropbox.com/scl/fi/k6rxp5yzti8508rj0c0ar/start.jpg?rlkey=wrgkb2ayjbdks0y06dik5fchm&st=k0ugkyt0&dl=0');
        
        // (Optional) Your fallback ninja link
        assets.ninja.src = cleanLink('https://www.dropbox.com/scl/fi/ds8o7v9btwiosubueo2te/original.png?rlkey=9seyrmsmtlxt9mqfmqbhi4s6k&st=2xtmpccp&dl=0');
    }

    // KICK OFF THE ENTIRE LOADING PROCESS!
    if (SHEET_API_URL === "YOUR_WEB_APP_URL_HERE") {
        alert("Don't forget to paste your Google Web App URL into the code!");
        loadGameAssets(); 
    } else {
        loadDataFromSheets();
    }


    // ==========================================
    // CORE GAME LOGIC
    // ==========================================

    const topMargin = 250; 
    const bottomMargin = 80; // ⬅️ NEW: Adds breathing room at the bottom of the screen!
    let numLanes = 1; 
    let laneHeight = 0;
    
    const globalCharacterScale = 1.90; 
    const characterYOffset = 15;      
    const wobbleSpeed = 120;  
    const wobbleHeight = 6.0; 
    const trackScale = 0.5; 
    const bgScale = 0.7; 
    const wallScale = 0.5; 

    const durationOptions = [
        { label: "Short (5s)", ms: 5000 },
        { label: "Medium (10s)", ms: 10000 },
        { label: "Long (30s)", ms: 30000 }
    ];
    let currentDurationIndex = 0; 
    let raceDurationMs = durationOptions[currentDurationIndex].ms;

    let masterRoster = [];
    let activeRoster = [];
    
    let cameraX = 0;
    let racers = [];
    let gameState = "ROSTER_SETUP"; 
    
    let accumulatedTime = 0; 
    let lastFrameTime = 0;
    let finishLineX = 0;
    
    let rankingsLocked = false; 
    let rankedResults = [];
    
    const laneColors = [
        '#FF6B6B', '#4D96FF', '#6BCB77', '#FFD93D', 
        '#9D4EDD', '#FF9F1C', '#00B4D8', '#F15BB5',
        '#00F5D4', '#FEE440', '#9B5DE5', '#F19C79',
        '#E63946', '#A8DADC', '#457B9D', '#1D3557'
    ];

    // UI EVENT LISTENERS
    document.getElementById('btn-save-roster').addEventListener('click', () => {
        const text = document.getElementById('roster-input').value;
        const currentInput = text.split('\n').map(name => name.trim()).filter(name => name.length > 0);
        
        if (currentInput.length === 0) {
            alert("Please enter at least one name!");
            return;
        }

        const hasNewNames = currentInput.some(name => !masterRoster.includes(name));
        if (hasNewNames || masterRoster.length === 0) {
            masterRoster = [...currentInput];
        }

        activeRoster = [...currentInput];
        rosterMenu.style.display = 'none';
        prepareNextRace();
    });

    btnRestoreRoster.addEventListener('click', () => {
        if (masterRoster.length > 0) {
            document.getElementById('roster-input').value = masterRoster.join('\n');
        }
    });

    btnEditRoster.addEventListener('click', () => {
        controlBar.style.display = 'none';
        document.getElementById('roster-input').value = activeRoster.join('\n');
        rosterMenu.style.display = 'block';
        gameState = "ROSTER_SETUP";
    });

// COSTUME CHANGE BUTTON LOGIC
    btnReroll.addEventListener('click', () => {
        // Shuffle the image bucket like a deck of cards!
        let shuffledBucket = [...baguetteBucket].sort(() => 0.5 - Math.random());
        
        racers.forEach((racer, index) => {
            let assignedImg = assets.ninja; 
            if (shuffledBucket.length > 0) {
                // The '%' symbol loops back to the start of the deck if we run out of images
                assignedImg = shuffledBucket[index % shuffledBucket.length];
            }
            racer.img = assignedImg;
        });
        
        draw(performance.now());
    });
    
    btnLength.addEventListener('click', () => {
        currentDurationIndex = (currentDurationIndex + 1) % durationOptions.length;
        raceDurationMs = durationOptions[currentDurationIndex].ms;
        btnLength.innerText = `⏱️ LENGTH: ${durationOptions[currentDurationIndex].label}`;
    });

    btnStart.addEventListener('click', () => {
        setupControls.style.display = 'none';
        raceControls.style.display = 'flex';
        
        gameState = "RACING";
        lastFrameTime = Date.now();
    });

    btnPause.addEventListener('click', (e) => {
        if (gameState === "RACING" || gameState === "CROSSING") {
            gameState = "PAUSED";
            e.target.innerText = "▶️ RESUME";
            e.target.classList.replace('warning', 'success');
        } else if (gameState === "PAUSED") {
            gameState = "RACING";
            lastFrameTime = Date.now(); 
            e.target.innerText = "⏸️ PAUSE";
            e.target.classList.replace('success', 'warning');
        }
    });

    btnReset.addEventListener('click', () => {
        prepareNextRace();
    });

    btnNextRace.addEventListener('click', () => {
        const checkboxes = document.querySelectorAll('.remove-cb');
        checkboxes.forEach(cb => {
            if (cb.checked) {
                activeRoster = activeRoster.filter(name => name !== cb.value);
            }
        });

        finishMenu.style.display = 'none';

        if (activeRoster.length === 0) {
            alert("Roster is empty! Everyone has been removed. Time to add a new class!");
            controlBar.style.display = 'none';
            document.getElementById('roster-input').value = ""; 
            rosterMenu.style.display = 'block';
            gameState = "ROSTER_SETUP";
        } else {
            prepareNextRace();
        }
    });

function resizeCanvas() {
        const gameArea = document.getElementById('game-area');
        canvas.width = gameArea.clientWidth;
        canvas.height = gameArea.clientHeight; 
        
        // ⬅️ UPDATED: Subtract the bottomMargin so the final lane doesn't touch the UI bar
        laneHeight = (canvas.height - topMargin - bottomMargin) / Math.max(1, numLanes);
    }
    
function initGame() {
        resizeCanvas(); 
        rosterMenu.style.display = 'block';
        controlBar.style.display = 'none';
        
        // 🎯 THE FIX: Force the cursor into the text box automatically!
        document.getElementById('roster-input').focus();
        
        requestAnimationFrame(gameLoop);
    }
    
function prepareNextRace() {
        let shuffledNames = [...activeRoster].sort(() => 0.5 - Math.random());
        // Shuffle the bucket for the starting line too!
        let shuffledBucket = [...baguetteBucket].sort(() => 0.5 - Math.random());
        
        numLanes = shuffledNames.length;
        resizeCanvas();

        racers = shuffledNames.map((name, index) => {
            let assignedImg = assets.ninja; 
            if (shuffledBucket.length > 0) {
                assignedImg = shuffledBucket[index % shuffledBucket.length];
            }

            return {
                id: name,
                img: assignedImg,
                lane: index,
                x: 100,
                targetX: 100
            };
        });

        cameraX = 0;
        accumulatedTime = 0;
        rankedResults = [];
        rankingsLocked = false; 
        progressBarFill.style.width = '0%';
        
        controlBar.style.display = 'flex';
        setupControls.style.display = 'flex';
        raceControls.style.display = 'none';
        
        btnPause.innerText = "⏸️ PAUSE";
        btnPause.className = "warning";

        gameState = "READY";
    }
    
    function gameLoop(timestamp) {
        update();
        draw(timestamp);
        requestAnimationFrame(gameLoop);
    }

    function update() {
        if (gameState === "ROSTER_SETUP" || gameState === "READY" || gameState === "PAUSED" || gameState === "FINISHED") return;

        let now = Date.now();
        let deltaTime = now - lastFrameTime;
        lastFrameTime = now;
        
if (gameState === "RACING" || gameState === "CROSSING") {
            // 🎯 YOUR FIX: Pure, smooth time-based calculation!
            let progress = (accumulatedTime / raceDurationMs) * 100; 
            progressBarFill.style.width = `${Math.min(progress, 100)}%`;
        }

        if (gameState === "RACING") {
            accumulatedTime += deltaTime;
        }

        let scrollSpeed = 8; 

        let isJockeying = gameState === "RACING" || (gameState === "CROSSING" && !rankingsLocked);

        if (isJockeying) {
            racers.forEach(racer => {
                if (Math.random() < 0.015) {
                    racer.targetX = Math.random() * (canvas.width * 0.5) + 150; 
                }
                racer.x += (racer.targetX - racer.x) * 0.015; 
            });
        }

        if (gameState === "RACING") {
            cameraX += scrollSpeed;
            if (accumulatedTime >= raceDurationMs) {
                gameState = "CROSSING";
                finishLineX = canvas.width; 
            }
        } 
        else if (gameState === "CROSSING") {
            cameraX += scrollSpeed;
            finishLineX -= scrollSpeed; 
            
            if (!rankingsLocked && finishLineX <= canvas.width * 0.6) {
                rankingsLocked = true;
                
               const getEffectiveScore = (racer) => {
                    const currentLaneYBase = topMargin + ((racer.lane + 1) * laneHeight);
                    
                    // Bring in the bottomMargin so the scale matches perfectly
                    const bottomMargin = 80; 
                    const referenceLaneHeight = (canvas.height - topMargin - bottomMargin) / 6;
                    
                    const dynamicScale = referenceLaneHeight / racer.img.height;
                    
                    // NEW: We need to calculate the width of the racer to find their nose!
                    const finalDrawWidth = (racer.img.width * dynamicScale) * globalCharacterScale;
                    const finalDrawHeight = (racer.img.height * dynamicScale) * globalCharacterScale;
                    
                    const racerY = currentLaneYBase - finalDrawHeight + characterYOffset; 
                    const relativeY = racerY - topMargin;
                    
                    // 🎯 THE FIX: Track the position at 85% of the image width (the Nose) instead of 0% (the Tail)
                    const racerNoseX = racer.x + (finalDrawWidth * 0.85);
                    
                    return racerNoseX + (0.4 * relativeY);
                };

                rankedResults = [...racers].sort((a, b) => getEffectiveScore(b) - getEffectiveScore(a));
            }

            if (finishLineX < -200) {
                gameState = "FINISHED";
                controlBar.style.display = 'none'; 
                showFinishMenu();
            }
        }
    }

    function showFinishMenu() {
        resultsListDiv.innerHTML = rankedResults.map((racer, index) => {
            let place = index === 0 ? "🏆 1st" : index === 1 ? "🥈 2nd" : index === 2 ? "🥉 3rd" : `${index + 1}th`;
            let color = laneColors[racer.lane % laneColors.length];
            
            return `
                <div class="result-row" style="border-left: 8px solid ${color};">
                    <span style="font-size: 20px; font-weight: bold;">${place}: ${racer.id}</span>
                    <label class="remove-label">
                        <input type="checkbox" class="remove-cb" value="${racer.id}">
                        Remove
                    </label>
                </div>
            `;
        }).join('');
        
        finishMenu.style.display = 'flex';
    }

    function draw(timestamp) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const bgWidth = (assets.bg.width || 800) * bgScale;
        const bgHeight = (assets.bg.height || 450) * bgScale;
        const bgYOffset = (topMargin + 20) - bgHeight; 
        const parallaxCameraX = cameraX * 0.15; 
        const bgOffset = -(parallaxCameraX % bgWidth);

        for (let i = -1; i < Math.ceil(canvas.width / bgWidth) + 1; i++) {
            ctx.drawImage(assets.bg, bgOffset + (i * bgWidth), bgYOffset, bgWidth, bgHeight);
        }

        const trackBaseWidth = assets.track.width || 200;
        const trackBaseHeight = assets.track.height || 200;
        const trackWidth = trackBaseWidth * trackScale;
        const trackHeight = trackBaseHeight * trackScale;
        const trackOffset = -(cameraX % trackWidth);

        for (let x = -1; x < Math.ceil(canvas.width / trackWidth) + 1; x++) {
            const tileIndexX = Math.floor(cameraX / trackWidth) + x; 
            for (let y = 0; y < Math.ceil((canvas.height - topMargin) / trackHeight); y++) {
                ctx.save();
                ctx.translate(0, topMargin); 
                if (Math.abs(tileIndexX) % 2 === 1) {
                    ctx.translate((x * trackWidth) + trackWidth + trackOffset, y * trackHeight);
                    ctx.scale(-1, 1);
                    ctx.drawImage(assets.track, 0, 0, trackWidth, trackHeight);
                } else {
                    ctx.drawImage(assets.track, trackOffset + (x * trackWidth), y * trackHeight, trackWidth, trackHeight);
                }
                ctx.restore();
            }
        }

        if (gameState === "CROSSING" || gameState === "FINISHED") {
            ctx.save();
            ctx.translate(finishLineX, topMargin); 
            ctx.transform(1, 0, -0.4, 1, 0, 0); 
            const startWidth = 60; 
            const startHeight = 60;
            for(let i = 0; i < Math.ceil((canvas.height - topMargin) / startHeight) + 2; i++) {
                ctx.drawImage(assets.start, 0, (i - 1) * startHeight, startWidth, startHeight);
            }
            ctx.restore();
        }

        const referenceLaneHeight = (canvas.height - topMargin) / 6;
        const nameFontSize = 28; 

        const wallAspect = assets.wall.width / assets.wall.height;
        const targetWallHeight = referenceLaneHeight * wallScale; 
        const targetWallWidth = targetWallHeight * wallAspect;
        const wallOffset = -(cameraX % targetWallWidth);

        for (let i = -1; i < Math.ceil(canvas.width / targetWallWidth) + 1; i++) {
            ctx.drawImage(assets.wall, wallOffset + (i * targetWallWidth), topMargin - targetWallHeight + 10, targetWallWidth, targetWallHeight);
        }

        for (let l = 0; l < numLanes; l++) {
            const currentLaneYBase = topMargin + ((l + 1) * laneHeight);

            if (gameState !== "ROSTER_SETUP") {
                racers.filter(r => r.lane === l).forEach((racer, index) => {
                   const currentWobble = (gameState === "RACING" || gameState === "CROSSING") ? Math.sin(timestamp / wobbleSpeed + racer.lane) * wobbleHeight : 0;
                    
                    const dynamicScale = referenceLaneHeight / racer.img.height;
                    const finalDrawWidth = (racer.img.width * dynamicScale) * globalCharacterScale;
                    const finalDrawHeight = (racer.img.height * dynamicScale) * globalCharacterScale;
                    
                    const racerY = currentLaneYBase - finalDrawHeight + characterYOffset; 
                    
                    ctx.drawImage(racer.img, racer.x, racerY + currentWobble, finalDrawWidth, finalDrawHeight);

                    ctx.font = `bold ${nameFontSize}px "Segoe UI", sans-serif`; 
                    const nameWidth = ctx.measureText(racer.id).width;
                    
                    const pad = 5;
                    const gap = -50; // The distance between the baguette and the name tag
                    
                    // Subtract the name width, the padding, and the gap to put it behind the racer
                    const tagX = racer.x - nameWidth - (pad * 2) - gap; 
                    const tagY = racerY + currentWobble + (finalDrawHeight * 0.35); 

                    ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                    ctx.beginPath();
                    ctx.roundRect(tagX, tagY - nameFontSize, nameWidth + (pad*2), nameFontSize * 1.5, 6);
                    ctx.fill();
                    
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = laneColors[racer.lane % laneColors.length];
                    ctx.stroke();

                    ctx.fillStyle = '#FFFFFF';
                    ctx.textAlign = 'left';
                    ctx.fillText(racer.id, tagX + pad, tagY);
                });
            }

            for (let i = -1; i < Math.ceil(canvas.width / targetWallWidth) + 1; i++) {
                ctx.drawImage(assets.wall, wallOffset + (i * targetWallWidth), currentLaneYBase - targetWallHeight + 10, targetWallWidth, targetWallHeight);
            }
        }
        
        if (gameState === "FINISHED") {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }
</script>
